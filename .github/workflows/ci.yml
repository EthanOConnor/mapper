name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  # Newest official Qt binary currently published for every supported target.
  QT_VERSION: "6.10.2"
  VCPKG_MAX_CONCURRENCY: 4
  VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache

jobs:
  desktop:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            preset: ci-linux
            qt-arch: linux_gcc_64
            triplet: x64-linux-release
          - name: macOS
            os: macos-15
            preset: ci-macos
            qt-arch: clang_64
            triplet: arm64-osx-release
          - name: Windows
            os: windows-2025
            preset: ci-windows
            qt-arch: win64_msvc2022_64
            triplet: x64-windows-static-md-release

    steps:
      - name: Check out Mapper
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check out vcpkg
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: microsoft/vcpkg
          ref: db4723bd0a99eab031f1a3dee4336dca43049c87
          path: .vcpkg

      - name: Restore dependency cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .vcpkg/downloads
            .vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json', 'cmake/vcpkg/**') }}
          restore-keys: vcpkg-${{ runner.os }}-${{ matrix.triplet }}-

      - name: Restore Rust cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin/cargo-about
            ~/.cargo/registry
            ~/.cargo/git
            build/${{ matrix.preset }}/cargo
          key: rust-${{ runner.os }}-${{ matrix.triplet }}-${{ hashFiles('rust-toolchain.toml', 'src/render/vello/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-${{ matrix.triplet }}-

      - name: Install Qt
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          arch: ${{ matrix.qt-arch }}
          modules: qtimageformats qtpositioning qtsensors qtserialport
          cache: true
          install-deps: true

      - name: Install CMake and Ninja
        run: python -m pip install --disable-pip-version-check cmake==4.4.0 ninja==1.13.0

      - name: Prepare build caches
        run: cmake -E make_directory .vcpkg-cache

      - name: Install Rust tools
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          if ! cargo-about --version 2>/dev/null | grep -qx 'cargo-about 0.9.1'; then
            cargo install cargo-about --version 0.9.1 --locked --features cli
          fi

      - name: Check Rust renderer
        env:
          CARGO_TARGET_DIR: build/${{ matrix.preset }}/cargo/checks
        run: |
          cargo fmt --manifest-path src/render/vello/Cargo.toml -- --check
          cargo clippy --manifest-path src/render/vello/Cargo.toml --locked --all-targets -- -D warnings
          cargo test --manifest-path src/render/vello/Cargo.toml --locked

      - name: Install Linux host tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes doxygen libegl1 libgl1-mesa-dev libvulkan1 libxcb-cursor0 libxkbcommon-x11-0 mesa-vulkan-drivers xvfb

      - name: Install macOS host tools
        if: runner.os == 'macOS'
        run: brew install doxygen

      - name: Install Windows host tools
        if: runner.os == 'Windows'
        run: choco install doxygen.install --yes --no-progress

      - name: Bootstrap vcpkg
        if: runner.os != 'Windows'
        run: .vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Bootstrap vcpkg on Windows
        if: runner.os == 'Windows'
        run: .vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Install Windows software GPU test runtime
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Match wgpu's own headless Windows CI: exercise the production DX12
          # backend against current Microsoft WARP, Agility SDK, and DXC bits.
          $runtime = Join-Path $env:RUNNER_TEMP 'mapper-gpu-test'
          New-Item -ItemType Directory -Force $runtime | Out-Null

          curl.exe -L --retry 5 https://www.nuget.org/api/v2/package/Microsoft.Direct3D.WARP/1.0.20 -o (Join-Path $runtime 'warp.zip')
          tar.exe -xf (Join-Path $runtime 'warp.zip') -C $runtime build/native/bin/x64/d3d10warp.dll
          Copy-Item (Join-Path $runtime 'build/native/bin/x64/d3d10warp.dll') build/ci-windows/Release/

          curl.exe -L --retry 5 https://www.nuget.org/api/v2/package/Microsoft.Direct3D.D3D12/1.619.0 -o (Join-Path $runtime 'agility.zip')
          tar.exe -xf (Join-Path $runtime 'agility.zip') -C $runtime build/native/bin/x64

          curl.exe -L --retry 5 https://github.com/microsoft/DirectXShaderCompiler/releases/download/v1.8.2505.1/dxc_2025_07_14.zip -o (Join-Path $runtime 'dxc.zip')
          Expand-Archive (Join-Path $runtime 'dxc.zip') -DestinationPath (Join-Path $runtime 'dxc')

          "WGPU_BACKEND=dx12" | Out-File -Append $env:GITHUB_ENV
          "WGPU_DX12_COMPILER=dxc" | Out-File -Append $env:GITHUB_ENV
          "WGPU_DX12_AGILITY_SDK_PATH=$(Join-Path $runtime 'build/native/bin/x64')" | Out-File -Append $env:GITHUB_ENV
          "WGPU_DX12_AGILITY_SDK_VERSION=619" | Out-File -Append $env:GITHUB_ENV
          "WGPU_DX12_AGILITY_SDK_REQUIRE=1" | Out-File -Append $env:GITHUB_ENV
          Join-Path $runtime 'dxc/bin/x64' | Out-File -Append $env:GITHUB_PATH

      - name: Test
        if: runner.os != 'Linux'
        run: ctest --preset ${{ matrix.preset }} --output-on-failure --parallel 4

      - name: Test under Xvfb
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum ctest --preset ${{ matrix.preset }} --output-on-failure --parallel 4

      - name: Remove Windows software GPU test runtime
        if: runner.os == 'Windows' && always()
        shell: pwsh
        run: Remove-Item -Force -ErrorAction SilentlyContinue build/ci-windows/Release/d3d10warp.dll

      - name: Package
        run: cmake --build --preset ${{ matrix.preset }} --target package

      - name: Upload package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Mapper-${{ matrix.name }}
          path: |
            build/${{ matrix.preset }}/OpenOrienteering-Mapper-*.dmg
            build/${{ matrix.preset }}/OpenOrienteering-Mapper-*.tar.gz
            build/${{ matrix.preset }}/OpenOrienteering-Mapper-*.zip
          if-no-files-found: error
          compression-level: 0

  android:
    name: Android
    runs-on: ubuntu-24.04
    timeout-minutes: 150
    env:
      VCPKG_TARGET_TRIPLET: arm64-android-release

    steps:
      - name: Check out Mapper
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check out vcpkg
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: microsoft/vcpkg
          ref: db4723bd0a99eab031f1a3dee4336dca43049c87
          path: .vcpkg

      - name: Restore dependency cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .vcpkg/downloads
            .vcpkg-cache
          key: vcpkg-Android-arm64-${{ hashFiles('vcpkg.json', 'cmake/vcpkg/**') }}
          restore-keys: vcpkg-Android-arm64-

      - name: Restore Rust cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin/cargo-about
            ~/.cargo/registry
            ~/.cargo/git
            build/ci-android/cargo
          key: rust-Android-arm64-${{ hashFiles('rust-toolchain.toml', 'src/render/vello/Cargo.lock') }}
          restore-keys: rust-Android-arm64-

      - name: Install JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 21

      - name: Install host Qt tools
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true
          install-deps: true

      - name: Install Qt for Android
        uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: android
          arch: android_arm64_v8a
          modules: qtimageformats qtpositioning qtsensors qtserialport
          cache: true
          install-deps: true

      - name: Export Qt host path
        run: echo "QT_HOST_PATH=$(dirname "${QT_ROOT_DIR}")/gcc_64" >> "$GITHUB_ENV"

      - name: Install Android and build tools
        run: |
          python -m pip install --disable-pip-version-check cmake==4.4.0 ninja==1.13.0
          cmake -E make_directory .vcpkg-cache
          sudo apt-get update
          sudo apt-get install --yes doxygen graphviz
          sdk_root="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          "${sdk_root}/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" "build-tools;36.0.0" "ndk;27.2.12479018"
          echo "ANDROID_SDK_ROOT=${sdk_root}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=${sdk_root}/ndk/27.2.12479018" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${sdk_root}/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install Rust tools
        shell: bash
        env:
          CARGO_TARGET_DIR: build/ci-android/cargo/checks
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup target add aarch64-linux-android
          if ! cargo-about --version 2>/dev/null | grep -qx 'cargo-about 0.9.1'; then
            cargo install cargo-about --version 0.9.1 --locked --features cli
          fi
          cargo fmt --manifest-path src/render/vello/Cargo.toml -- --check
          NDK_BIN="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export CC_aarch64_linux_android="${NDK_BIN}/aarch64-linux-android28-clang"
          export CXX_aarch64_linux_android="${NDK_BIN}/aarch64-linux-android28-clang++"
          export AR_aarch64_linux_android="${NDK_BIN}/llvm-ar"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="${CC_aarch64_linux_android}"
          echo "CC_aarch64_linux_android=${CC_aarch64_linux_android}" >> "$GITHUB_ENV"
          echo "CXX_aarch64_linux_android=${CXX_aarch64_linux_android}" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=${AR_aarch64_linux_android}" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER}" >> "$GITHUB_ENV"
          cargo check --manifest-path src/render/vello/Cargo.toml --target aarch64-linux-android --locked

      - name: Bootstrap vcpkg
        run: .vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Configure
        run: cmake --preset ci-android

      - name: Build APK and app bundle
        run: |
          cmake --build --preset ci-android --target apk
          cmake --build --preset ci-android --target aab

      - name: Upload Android packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Mapper-Android
          path: |
            build/ci-android/src/android-build/Mapper.apk
            build/ci-android/src/android-build/build/outputs/bundle/release/android-build-release.aab
          if-no-files-found: error
          compression-level: 0

  release-draft:
    name: Draft release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [desktop, android]
    runs-on: ubuntu-24.04
    permissions:
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: Attest packages
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release-assets/**/*

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --draft --generate-notes --verify-tag
          find release-assets -type f -exec gh release upload "$GITHUB_REF_NAME" {} +
