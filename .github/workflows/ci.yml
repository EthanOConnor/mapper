name: CI

on:
  push:
    branches: [master, full-speed-ahead, 'pr/*', 'int/*']
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ninja-build ccache \
            qt6-base-dev qt6-base-private-dev qt6-tools-dev qt6-tools-dev-tools \
            qt6-l10n-tools qt6-sensors-dev qt6-serialport-dev \
            qt6-positioning-dev qt6-image-formats-plugins qt6-5compat-dev \
            libproj-dev libgdal-dev libpolyclipping-dev zlib1g-dev \
            libcups2-dev doxygen graphviz libegl-dev libgl-dev

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          key: linux

      - name: Configure
        run: >
          cmake --preset ci-linux
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build --preset ci-linux --parallel

      - name: Test
        run: ctest --preset ci-linux

  windows:
    runs-on: windows-2025
    timeout-minutes: 60
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Configure checkout line endings
        shell: powershell
        run: git config --global core.autocrlf input

      - uses: actions/checkout@v6

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: minimal
          update: true
          cache: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-ccache
            mingw-w64-x86_64-gdal
            mingw-w64-x86_64-proj
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-imageformats
            mingw-w64-x86_64-qt6-positioning
            mingw-w64-x86_64-qt6-sensors
            mingw-w64-x86_64-qt6-serialport
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-qt6-translations
            mingw-w64-x86_64-qt6-5compat
            mingw-w64-x86_64-doxygen

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          key: windows

      - name: Configure
        run: >
          cmake --preset ci-windows
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build --preset ci-windows --parallel

      - name: Test
        run: ctest --preset ci-windows

  macos:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          brew install qt proj gdal ninja ccache doxygen
          echo "$(brew --prefix qt)/bin" >> "$GITHUB_PATH"

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          key: macos

      - name: Configure
        run: >
          cmake --preset ci-macos
          -DCMAKE_PREFIX_PATH="$(brew --prefix qt)"
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build --preset ci-macos --parallel

      - name: Test
        run: ctest --preset ci-macos

  android:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      ANDROID_NDK_VERSION: "27.2.12479018"
      QT_VERSION: "6.10.2"
      PROJ_VERSION: "9.6.2"
      SQLITE_VERSION: "3.51.3"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;$ANDROID_NDK_VERSION" >/dev/null 2>&1
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION" >> "$GITHUB_ENV"

      - name: Install host Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true

      - name: Save host Qt path
        run: echo "QT_HOST_PATH=$QT_ROOT_DIR" >> "$GITHUB_ENV"

      - name: Install Qt for Android
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: android
          arch: android_arm64_v8a
          modules: qt5compat qtsensors qtpositioning
          cache: true

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          key: android

      - name: Cache mobile dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: build/android-deps-arm64/install
          key: android-deps-proj${{ env.PROJ_VERSION }}-sqlite${{ env.SQLITE_VERSION }}

      - name: Cross-compile dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          ./scripts/build-mobile-deps.sh \
            --target android-arm64 \
            --prefix build/android-deps-arm64/install \
            --ndk "$ANDROID_NDK_ROOT" \
            --no-gdal

      - name: Configure
        run: >
          cmake --preset android-arm64
          -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR};${{ github.workspace }}/build/android-deps-arm64/install"
          -DCMAKE_FIND_ROOT_PATH="${QT_ROOT_DIR};${{ github.workspace }}/build/android-deps-arm64/install"
          -DANDROID_SDK_ROOT="$ANDROID_HOME"
          -DANDROID_STL=c++_shared
          -DMapper_USE_GDAL=OFF
          -DMapper_WITH_COVE=OFF
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build/android-arm64 --parallel

      - name: Build APK
        run: cmake --build build/android-arm64 --target Mapper_make_apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64-apk
          path: build/android-arm64/src/android-build/Mapper.apk
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  codespell:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 20

      - name: Install codespell
        run: pip install codespell

      - name: Run codespell
        run: ./codespell.sh
