name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CACHE_SCHEMA: v3
  CARGO_ABOUT_VERSION: "0.9.1"
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  # Newest stable Qt release published for every supported target.
  QT_VERSION: "6.11.1"
  VCPKG_MAX_CONCURRENCY: 4
  VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache

jobs:
  desktop:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            preset: ci-linux
            qt-arch: linux_gcc_64
            triplet: x64-linux-release
            compiler: gcc
          - name: macOS
            os: macos-15
            preset: ci-macos
            qt-arch: clang_64
            triplet: arm64-osx-release
            compiler: appleclang
          - name: Windows
            os: windows-2025-vs2026
            preset: ci-windows
            qt-arch: win64_msvc2022_64
            triplet: x64-windows-static-md-release
            compiler: msvc-vs2026

    steps:
      - name: Check out Mapper
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read vcpkg baseline
        id: vcpkg_baseline
        shell: bash
        run: python -c 'import json; print("sha=" + json.load(open("vcpkg.json", encoding="utf-8"))["builtin-baseline"])' >> "$GITHUB_OUTPUT"

      - name: Check out vcpkg
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: microsoft/vcpkg
          ref: ${{ steps.vcpkg_baseline.outputs.sha }}
          path: .vcpkg

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt

      - name: Resolve cache identity
        id: cache_identity
        shell: pwsh
        env:
          COMPILER_LABEL: ${{ matrix.compiler }}
        run: |
          $rust = rustc -vV
          $rust_release = (($rust | Where-Object { $_ -like 'release:*' }) -split ': ', 2)[1]
          $rust_commit = (($rust | Where-Object { $_ -like 'commit-hash:*' }) -split ': ', 2)[1]

          if ($IsWindows) {
            $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
            $installation = & $vswhere -latest -products '*' -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
            $compiler_banner = "MSVC " + (Get-Content (Join-Path $installation 'VC\Auxiliary\Build\Microsoft.VCToolsVersion.default.txt')).Trim()
          } else {
            $compiler_banner = (& c++ --version | Select-Object -First 1)
          }

          $compiler_bytes = [Text.Encoding]::UTF8.GetBytes($compiler_banner)
          $compiler_hash = [Convert]::ToHexString([Security.Cryptography.SHA256]::HashData($compiler_bytes)).ToLowerInvariant().Substring(0, 16)
          "rust=$rust_release-$($rust_commit.Substring(0, 12))" >> $env:GITHUB_OUTPUT
          "compiler=$env:COMPILER_LABEL-$compiler_hash" >> $env:GITHUB_OUTPUT

      - name: Restore vcpkg downloads
        id: vcpkg_downloads
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .vcpkg/downloads
          key: mapper-${{ env.CACHE_SCHEMA }}-vcpkg-downloads-${{ matrix.os }}-${{ runner.arch }}-${{ matrix.triplet }}-${{ steps.vcpkg_baseline.outputs.sha }}-${{ hashFiles('vcpkg.json', 'cmake/vcpkg/**') }}
          restore-keys: |
            mapper-${{ env.CACHE_SCHEMA }}-vcpkg-downloads-${{ matrix.os }}-${{ runner.arch }}-${{ matrix.triplet }}-${{ steps.vcpkg_baseline.outputs.sha }}-

      - name: Restore vcpkg binary cache
        id: vcpkg_binary
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .vcpkg-cache
          key: mapper-${{ env.CACHE_SCHEMA }}-vcpkg-binary-${{ matrix.os }}-${{ runner.arch }}-${{ matrix.triplet }}-${{ steps.cache_identity.outputs.compiler }}-${{ steps.vcpkg_baseline.outputs.sha }}-${{ hashFiles('requirements-build.txt', 'vcpkg.json', 'cmake/vcpkg/**') }}

      - name: Restore Cargo sources
        id: cargo_sources
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: mapper-${{ env.CACHE_SCHEMA }}-cargo-sources-${{ matrix.os }}-${{ runner.arch }}-${{ matrix.triplet }}-${{ steps.cache_identity.outputs.rust }}-${{ hashFiles('rust-toolchain.toml', 'src/render/vello/Cargo.toml', 'src/render/vello/Cargo.lock') }}
          restore-keys: |
            mapper-${{ env.CACHE_SCHEMA }}-cargo-sources-${{ matrix.os }}-${{ runner.arch }}-${{ matrix.triplet }}-${{ steps.cache_identity.outputs.rust }}-

      - name: Restore Rust target cache
        id: rust_target
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build/${{ matrix.preset }}/cargo
          key: mapper-${{ env.CACHE_SCHEMA }}-rust-target-${{ matrix.os }}-${{ runner.arch }}-${{ matrix.preset }}-${{ matrix.triplet }}-${{ steps.cache_identity.outputs.rust }}-${{ steps.cache_identity.outputs.compiler }}-${{ hashFiles('requirements-build.txt', 'rust-toolchain.toml', 'CMakePresets.json', 'CMakeLists.txt', 'src/CMakeLists.txt', 'src/render/vello/Cargo.toml', 'src/render/vello/Cargo.lock', 'src/render/vello/build.rs', 'src/render/vello/src/**', 'cmake/**') }}

      - name: Restore cargo-about
        id: cargo_about
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build/${{ matrix.preset }}/tools/cargo-about/bin
          key: mapper-${{ env.CACHE_SCHEMA }}-cargo-about-${{ matrix.os }}-${{ runner.arch }}-${{ matrix.preset }}-${{ env.CARGO_ABOUT_VERSION }}-${{ steps.cache_identity.outputs.rust }}

      - name: Set up Python for Qt installation
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13.3"

      - name: Install Qt
        uses: jurplel/install-qt-action/action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          arch: ${{ matrix.qt-arch }}
          modules: qtimageformats qtpositioning qtsensors qtserialport
          cache: false
          install-deps: true

      - name: Install CMake and Ninja
        run: python -m pip install --disable-pip-version-check --requirement requirements-build.txt

      - name: Prepare build caches
        run: cmake -E make_directory .vcpkg-cache

      - name: Install Rust tools
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cargo_about_root="$GITHUB_WORKSPACE/build/${{ matrix.preset }}/tools/cargo-about"
          echo "$cargo_about_root/bin" >> "$GITHUB_PATH"
          export PATH="$cargo_about_root/bin:$PATH"
          if ! cargo-about --version 2>/dev/null | grep -qx "cargo-about $CARGO_ABOUT_VERSION"; then
            cargo install cargo-about --root "$cargo_about_root" --version "$CARGO_ABOUT_VERSION" --locked --features cli
          fi

      - name: Install Rust tools on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cargo_about_root = Join-Path $env:GITHUB_WORKSPACE 'build/${{ matrix.preset }}/tools/cargo-about'
          $cargo_about_bin = Join-Path $cargo_about_root 'bin'
          $cargo_about_bin | Out-File -Append $env:GITHUB_PATH
          $env:PATH = "$cargo_about_bin;$env:PATH"
          $installed = Get-Command cargo-about -ErrorAction SilentlyContinue
          if (-not $installed -or (& cargo-about --version) -ne "cargo-about $env:CARGO_ABOUT_VERSION") {
            cargo install cargo-about --root $cargo_about_root --version $env:CARGO_ABOUT_VERSION --locked --features cli
          }

      - name: Check Rust renderer
        env:
          CARGO_TARGET_DIR: build/${{ matrix.preset }}/cargo/checks
        run: |
          cargo fmt --manifest-path src/render/vello/Cargo.toml -- --check
          cargo clippy --manifest-path src/render/vello/Cargo.toml --locked --all-targets -- -D warnings
          cargo test --manifest-path src/render/vello/Cargo.toml --locked

      - name: Install Linux host tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes doxygen libegl1 libgl1-mesa-dev libvulkan1 libxcb-cursor0 libxkbcommon-x11-0 mesa-vulkan-drivers xvfb

      - name: Install macOS host tools
        if: runner.os == 'macOS'
        run: brew install doxygen

      - name: Install Windows host tools
        if: runner.os == 'Windows'
        run: choco install doxygen.install --yes --no-progress

      - name: Bootstrap vcpkg
        if: runner.os != 'Windows'
        run: .vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Bootstrap vcpkg on Windows
        if: runner.os == 'Windows'
        run: .vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Install Windows software GPU test runtime
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Match wgpu's own headless Windows CI: exercise the production DX12
          # backend against current Microsoft WARP, Agility SDK, and DXC bits.
          $runtime = Join-Path $env:RUNNER_TEMP 'mapper-gpu-test'
          New-Item -ItemType Directory -Force $runtime | Out-Null

          curl.exe -L --retry 5 https://www.nuget.org/api/v2/package/Microsoft.Direct3D.WARP/1.0.20 -o (Join-Path $runtime 'warp.zip')
          tar.exe -xf (Join-Path $runtime 'warp.zip') -C $runtime build/native/bin/x64/d3d10warp.dll
          Copy-Item (Join-Path $runtime 'build/native/bin/x64/d3d10warp.dll') build/ci-windows/test/Release/

          curl.exe -L --retry 5 https://www.nuget.org/api/v2/package/Microsoft.Direct3D.D3D12/1.619.0 -o (Join-Path $runtime 'agility.zip')
          tar.exe -xf (Join-Path $runtime 'agility.zip') -C $runtime build/native/bin/x64

          curl.exe -L --retry 5 https://github.com/microsoft/DirectXShaderCompiler/releases/download/v1.8.2505.1/dxc_2025_07_14.zip -o (Join-Path $runtime 'dxc.zip')
          Expand-Archive (Join-Path $runtime 'dxc.zip') -DestinationPath (Join-Path $runtime 'dxc')

          "WGPU_BACKEND=dx12" | Out-File -Append $env:GITHUB_ENV
          "WGPU_ADAPTER_NAME=Microsoft Basic Render Driver" | Out-File -Append $env:GITHUB_ENV
          "WGPU_DX12_COMPILER=dxc" | Out-File -Append $env:GITHUB_ENV
          "WGPU_DX12_AGILITY_SDK_PATH=$(Join-Path $runtime 'build/native/bin/x64')" | Out-File -Append $env:GITHUB_ENV
          "WGPU_DX12_AGILITY_SDK_VERSION=619" | Out-File -Append $env:GITHUB_ENV
          "WGPU_DX12_AGILITY_SDK_REQUIRE=1" | Out-File -Append $env:GITHUB_ENV
          Join-Path $runtime 'dxc/bin/x64' | Out-File -Append $env:GITHUB_PATH

      - name: Test
        if: runner.os != 'Linux'
        run: ctest --preset ${{ matrix.preset }} --output-on-failure --parallel 4

      - name: Test under Xvfb
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum ctest --preset ${{ matrix.preset }} --output-on-failure --parallel 4

      - name: Report failed Windows tests
        if: runner.os == 'Windows' && failure()
        shell: pwsh
        run: |
          $failed_tests = 'build/ci-windows/Testing/Temporary/LastTestsFailed.log'
          if (Test-Path $failed_tests) {
            Get-Content $failed_tests | ForEach-Object {
              $name = ($_ -split ':', 2)[1]
              Write-Host "`n===== $name ====="
              Get-Content "build/ci-windows/test/$name.txt"
            }
          }

      - name: Remove Windows software GPU test runtime
        if: runner.os == 'Windows' && always()
        shell: pwsh
        run: Remove-Item -Force -ErrorAction SilentlyContinue build/ci-windows/test/Release/d3d10warp.dll

      - name: Package
        run: cmake --build --preset ${{ matrix.preset }} --target package

      - name: Smoke-test Linux package
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          packages=(build/${{ matrix.preset }}/OpenOrienteering-Mapper-*.tar.gz)
          if (( ${#packages[@]} != 1 )); then
            echo "Expected one Linux package, found ${#packages[@]}" >&2
            exit 1
          fi

          archive="${packages[0]}"
          smoke_root="$(mktemp -d "$RUNNER_TEMP/mapper-package-smoke.XXXXXX")"
          package_root="$smoke_root/$(basename "$archive" .tar.gz)"
          tar -xzf "$archive" -C "$smoke_root"

          mapper="$package_root/bin/Mapper"
          for required in \
            "$mapper" \
            "$package_root/lib/libQt6Core.so.6" \
            "$package_root/plugins/platforms/libqxcb.so" \
            "$package_root/share/openorienteering-mapper/proj/proj.db" \
            "$package_root/share/doc/openorienteering-mapper/manual/index.html"
          do
            test -e "$required" || {
              echo "Required packaged file is missing: $required" >&2
              exit 1
            }
          done
          test -x "$mapper"

          unset LD_LIBRARY_PATH QT_PLUGIN_PATH QML2_IMPORT_PATH
          ldd "$mapper" > "$smoke_root/ldd.txt"
          cat "$smoke_root/ldd.txt"
          if grep -Fq "not found" "$smoke_root/ldd.txt"; then
            echo "Packaged Mapper has unresolved runtime dependencies" >&2
            exit 1
          fi

          mkdir -p "$smoke_root/home"
          set +e
          HOME="$smoke_root/home" \
            timeout --signal=TERM --kill-after=5s 10s \
            xvfb-run --auto-servernum "$mapper" \
            > "$smoke_root/mapper.log" 2>&1
          status=$?
          set -e
          if (( status != 124 )); then
            cat "$smoke_root/mapper.log" >&2
            echo "Packaged Mapper exited during startup smoke with status $status" >&2
            exit 1
          fi

          echo "Packaged Mapper remained alive for the 10-second startup smoke"

      - name: Smoke-test macOS package
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          packages=(build/${{ matrix.preset }}/OpenOrienteering-Mapper-*.dmg)
          if (( ${#packages[@]} != 1 )); then
            echo "Expected one macOS package, found ${#packages[@]}" >&2
            exit 1
          fi

          dmg="${packages[0]}"
          smoke_root="$(mktemp -d "$RUNNER_TEMP/mapper-package-smoke.XXXXXX")"
          mountpoint="$smoke_root/mount"
          mkdir -p "$mountpoint" "$smoke_root/home"

          mounted=0
          pid=""
          cleanup() {
            if [[ -n "$pid" ]] && kill -0 "$pid" 2>/dev/null; then
              kill "$pid" 2>/dev/null || true
              wait "$pid" 2>/dev/null || true
            fi
            if (( mounted )); then
              hdiutil detach "$mountpoint" || true
            fi
          }
          trap cleanup EXIT

          hdiutil verify "$dmg"
          hdiutil attach -readonly -nobrowse -mountpoint "$mountpoint" "$dmg"
          mounted=1

          mounted_app="$mountpoint/Mapper.app"
          for required in \
            "$mounted_app/Contents/MacOS/Mapper" \
            "$mounted_app/Contents/PlugIns/platforms/libqcocoa.dylib" \
            "$mounted_app/Contents/Resources/proj/proj.db" \
            "$mounted_app/Contents/Resources/doc/manual/index.html"
          do
            test -e "$required" || {
              echo "Required packaged file is missing: $required" >&2
              exit 1
            }
          done

          copied_app="$smoke_root/Mapper.app"
          ditto "$mounted_app" "$copied_app"
          hdiutil detach "$mountpoint"
          mounted=0

          plutil -lint "$copied_app/Contents/Info.plist"
          unset DYLD_LIBRARY_PATH DYLD_FRAMEWORK_PATH QT_PLUGIN_PATH QML2_IMPORT_PATH

          mapper="$copied_app/Contents/MacOS/Mapper"
          log="$smoke_root/mapper.log"
          HOME="$smoke_root/home" "$mapper" > "$log" 2>&1 &
          pid=$!
          for _ in {1..10}; do
            sleep 1
            if ! kill -0 "$pid" 2>/dev/null; then
              status=0
              wait "$pid" || status=$?
              pid=""
              cat "$log" >&2
              echo "Packaged Mapper exited during startup smoke with status $status" >&2
              exit 1
            fi
          done

          kill "$pid" 2>/dev/null || true
          wait "$pid" 2>/dev/null || true
          pid=""
          echo "Packaged Mapper remained alive for the 10-second startup smoke"

      - name: Smoke-test Windows package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packages = @(Get-ChildItem `
            -Path 'build/${{ matrix.preset }}/OpenOrienteering-Mapper-*.zip' `
            -File)
          if ($packages.Count -ne 1) {
            throw "Expected one Windows package, found $($packages.Count)"
          }

          $archive = $packages[0]
          $smokeRoot = Join-Path $env:RUNNER_TEMP "mapper-package-smoke-$PID"
          Expand-Archive -LiteralPath $archive.FullName -DestinationPath $smokeRoot
          $packageRoot = Join-Path $smokeRoot $archive.BaseName
          $exe = Join-Path $packageRoot 'Mapper.exe'

          foreach ($required in @(
            $exe,
            (Join-Path $packageRoot 'Qt6Core.dll'),
            (Join-Path $packageRoot 'qt.conf'),
            (Join-Path $packageRoot 'plugins/platforms/qwindows.dll'),
            (Join-Path $packageRoot 'proj/proj.db'),
            (Join-Path $packageRoot 'doc/manual/index.html')
          )) {
            if (-not (Test-Path -LiteralPath $required -PathType Leaf)) {
              throw "Required packaged file is missing: $required"
            }
          }

          # The ZIP must launch with only its own DLLs and Windows itself.
          $env:Path = "$env:SystemRoot\System32;$env:SystemRoot"
          foreach ($name in @(
            'QT_PLUGIN_PATH',
            'QML2_IMPORT_PATH',
            'QT_ROOT_DIR'
          )) {
            Remove-Item -Path "Env:$name" -ErrorAction SilentlyContinue
          }

          $env:APPDATA = Join-Path $smokeRoot 'appdata'
          $env:LOCALAPPDATA = Join-Path $smokeRoot 'localappdata'
          New-Item -ItemType Directory -Force $env:APPDATA, $env:LOCALAPPDATA |
            Out-Null

          $stdout = Join-Path $smokeRoot 'mapper.stdout.log'
          $stderr = Join-Path $smokeRoot 'mapper.stderr.log'
          $process = $null
          try {
            $process = Start-Process `
              -FilePath $exe `
              -WorkingDirectory $packageRoot `
              -RedirectStandardOutput $stdout `
              -RedirectStandardError $stderr `
              -PassThru
            Start-Sleep -Seconds 10
            $process.Refresh()
            if ($process.HasExited) {
              Get-Content $stdout, $stderr -ErrorAction SilentlyContinue
              throw "Packaged Mapper exited during startup smoke with code $($process.ExitCode)"
            }
          }
          finally {
            if ($null -ne $process) {
              $process.Refresh()
              if (-not $process.HasExited) {
                Stop-Process -Id $process.Id -Force
                $process.WaitForExit()
              }
            }
          }

          Write-Host 'Packaged Mapper remained alive for the 10-second startup smoke'

      - name: Upload package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Mapper-${{ matrix.name }}
          path: |
            build/${{ matrix.preset }}/OpenOrienteering-Mapper-*.dmg
            build/${{ matrix.preset }}/OpenOrienteering-Mapper-*.tar.gz
            build/${{ matrix.preset }}/OpenOrienteering-Mapper-*.zip
          if-no-files-found: error
          compression-level: 0

      - name: Save vcpkg downloads
        if: >-
          success() &&
          steps.vcpkg_downloads.outputs.cache-hit != 'true' &&
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .vcpkg/downloads
          key: ${{ steps.vcpkg_downloads.outputs.cache-primary-key }}

      - name: Save vcpkg binary cache
        if: >-
          success() &&
          steps.vcpkg_binary.outputs.cache-hit != 'true' &&
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .vcpkg-cache
          key: ${{ steps.vcpkg_binary.outputs.cache-primary-key }}

      - name: Save Cargo sources
        if: >-
          success() &&
          steps.cargo_sources.outputs.cache-hit != 'true' &&
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ steps.cargo_sources.outputs.cache-primary-key }}

      - name: Save Rust target cache
        if: >-
          success() &&
          steps.rust_target.outputs.cache-hit != 'true' &&
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build/${{ matrix.preset }}/cargo
          key: ${{ steps.rust_target.outputs.cache-primary-key }}

      - name: Save cargo-about
        if: >-
          success() &&
          steps.cargo_about.outputs.cache-hit != 'true' &&
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build/${{ matrix.preset }}/tools/cargo-about/bin
          key: ${{ steps.cargo_about.outputs.cache-primary-key }}

  android:
    name: Android
    runs-on: ubuntu-24.04
    timeout-minutes: 150
    env:
      VCPKG_TARGET_TRIPLET: arm64-android-release

    steps:
      - name: Check out Mapper
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read vcpkg baseline
        id: vcpkg_baseline
        shell: bash
        run: python -c 'import json; print("sha=" + json.load(open("vcpkg.json", encoding="utf-8"))["builtin-baseline"])' >> "$GITHUB_OUTPUT"

      - name: Check out vcpkg
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: microsoft/vcpkg
          ref: ${{ steps.vcpkg_baseline.outputs.sha }}
          path: .vcpkg

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup target add aarch64-linux-android

      - name: Resolve cache identity
        id: cache_identity
        shell: pwsh
        run: |
          $rust = rustc -vV
          $rust_release = (($rust | Where-Object { $_ -like 'release:*' }) -split ': ', 2)[1]
          $rust_commit = (($rust | Where-Object { $_ -like 'commit-hash:*' }) -split ': ', 2)[1]
          "rust=$rust_release-$($rust_commit.Substring(0, 12))" >> $env:GITHUB_OUTPUT

      - name: Restore vcpkg downloads
        id: vcpkg_downloads
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .vcpkg/downloads
          key: mapper-${{ env.CACHE_SCHEMA }}-vcpkg-downloads-ubuntu-24.04-${{ runner.arch }}-${{ env.VCPKG_TARGET_TRIPLET }}-${{ steps.vcpkg_baseline.outputs.sha }}-${{ hashFiles('vcpkg.json', 'cmake/vcpkg/**') }}
          restore-keys: |
            mapper-${{ env.CACHE_SCHEMA }}-vcpkg-downloads-ubuntu-24.04-${{ runner.arch }}-${{ env.VCPKG_TARGET_TRIPLET }}-${{ steps.vcpkg_baseline.outputs.sha }}-

      - name: Restore vcpkg binary cache
        id: vcpkg_binary
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .vcpkg-cache
          key: mapper-${{ env.CACHE_SCHEMA }}-vcpkg-binary-ubuntu-24.04-${{ runner.arch }}-${{ env.VCPKG_TARGET_TRIPLET }}-ndk-27.2.12479018-api28-${{ steps.vcpkg_baseline.outputs.sha }}-${{ hashFiles('requirements-build.txt', 'vcpkg.json', 'cmake/vcpkg/**') }}

      - name: Restore Cargo sources
        id: cargo_sources
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: mapper-${{ env.CACHE_SCHEMA }}-cargo-sources-ubuntu-24.04-${{ runner.arch }}-${{ env.VCPKG_TARGET_TRIPLET }}-${{ steps.cache_identity.outputs.rust }}-${{ hashFiles('rust-toolchain.toml', 'src/render/vello/Cargo.toml', 'src/render/vello/Cargo.lock') }}
          restore-keys: |
            mapper-${{ env.CACHE_SCHEMA }}-cargo-sources-ubuntu-24.04-${{ runner.arch }}-${{ env.VCPKG_TARGET_TRIPLET }}-${{ steps.cache_identity.outputs.rust }}-

      - name: Restore Rust target cache
        id: rust_target
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build/ci-android/cargo
          key: mapper-${{ env.CACHE_SCHEMA }}-rust-target-ubuntu-24.04-${{ runner.arch }}-ci-android-${{ env.VCPKG_TARGET_TRIPLET }}-${{ steps.cache_identity.outputs.rust }}-ndk-27.2.12479018-api28-${{ hashFiles('requirements-build.txt', 'rust-toolchain.toml', 'CMakePresets.json', 'CMakeLists.txt', 'src/CMakeLists.txt', 'src/render/vello/Cargo.toml', 'src/render/vello/Cargo.lock', 'src/render/vello/build.rs', 'src/render/vello/src/**', 'cmake/**') }}

      - name: Restore cargo-about
        id: cargo_about
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build/ci-android/tools/cargo-about/bin
          key: mapper-${{ env.CACHE_SCHEMA }}-cargo-about-ubuntu-24.04-${{ runner.arch }}-ci-android-${{ env.CARGO_ABOUT_VERSION }}-${{ steps.cache_identity.outputs.rust }}

      - name: Install JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Python for Qt installation
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13.3"

      - name: Install host Qt tools
        uses: jurplel/install-qt-action/action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: false
          install-deps: true

      - name: Install Qt for Android
        uses: jurplel/install-qt-action/action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          host: all_os
          target: android
          arch: android_arm64_v8a
          modules: qtimageformats qtpositioning qtsensors qtserialport
          cache: false
          install-deps: true

      - name: Export Qt host path
        run: echo "QT_HOST_PATH=$(dirname "${QT_ROOT_DIR}")/gcc_64" >> "$GITHUB_ENV"

      - name: Install Android and build tools
        run: |
          python -m pip install --disable-pip-version-check --requirement requirements-build.txt
          cmake -E make_directory .vcpkg-cache
          sudo apt-get update
          sudo apt-get install --yes doxygen graphviz
          sdk_root="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          "${sdk_root}/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" "build-tools;36.0.0" "ndk;27.2.12479018"
          echo "ANDROID_SDK_ROOT=${sdk_root}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=${sdk_root}/ndk/27.2.12479018" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${sdk_root}/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install cargo-about
        shell: bash
        run: |
          cargo_about_root="$GITHUB_WORKSPACE/build/ci-android/tools/cargo-about"
          echo "$cargo_about_root/bin" >> "$GITHUB_PATH"
          export PATH="$cargo_about_root/bin:$PATH"
          if ! cargo-about --version 2>/dev/null | grep -qx "cargo-about $CARGO_ABOUT_VERSION"; then
            cargo install cargo-about --root "$cargo_about_root" --version "$CARGO_ABOUT_VERSION" --locked --features cli
          fi

      - name: Check Rust renderer
        shell: bash
        env:
          CARGO_TARGET_DIR: build/ci-android/cargo/checks
        run: |
          cargo fmt --manifest-path src/render/vello/Cargo.toml -- --check
          NDK_BIN="${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export CC_aarch64_linux_android="${NDK_BIN}/aarch64-linux-android28-clang"
          export CXX_aarch64_linux_android="${NDK_BIN}/aarch64-linux-android28-clang++"
          export AR_aarch64_linux_android="${NDK_BIN}/llvm-ar"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="${CC_aarch64_linux_android}"
          echo "CC_aarch64_linux_android=${CC_aarch64_linux_android}" >> "$GITHUB_ENV"
          echo "CXX_aarch64_linux_android=${CXX_aarch64_linux_android}" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=${AR_aarch64_linux_android}" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER}" >> "$GITHUB_ENV"
          cargo check --manifest-path src/render/vello/Cargo.toml --target aarch64-linux-android --locked

      - name: Bootstrap vcpkg
        run: .vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Configure
        run: cmake --preset ci-android

      - name: Build APK and app bundle
        run: |
          cmake --build --preset ci-android --target apk
          cmake --build --preset ci-android --target aab

      - name: Inspect Android packages
        shell: bash
        run: |
          set -euo pipefail
          apk=build/ci-android/src/android-build/Mapper.apk
          aab=build/ci-android/src/android-build/build/outputs/bundle/release/android-build-release.aab
          build_tools="${ANDROID_SDK_ROOT}/build-tools/36.0.0"

          test -s "$apk"
          test -s "$aab"
          test -x "$build_tools/aapt"
          test -x "$build_tools/zipalign"
          unzip -tqq "$apk"
          unzip -tqq "$aab"
          "$build_tools/zipalign" -c -P 16 4 "$apk"

          apk_entries="$RUNNER_TEMP/mapper-apk-entries.txt"
          aab_entries="$RUNNER_TEMP/mapper-aab-entries.txt"
          badging="$RUNNER_TEMP/mapper-apk-badging.txt"
          unzip -Z1 "$apk" > "$apk_entries"
          unzip -Z1 "$aab" > "$aab_entries"
          "$build_tools/aapt" dump badging "$apk" > "$badging"

          grep -Fx 'AndroidManifest.xml' "$apk_entries"
          grep -Fx 'classes.dex' "$apk_entries"
          grep -Fx 'lib/arm64-v8a/libMapper_arm64-v8a.so' "$apk_entries"
          grep -Fx 'BundleConfig.pb' "$aab_entries"
          grep -Fx 'base/manifest/AndroidManifest.xml' "$aab_entries"
          grep -Fx 'base/dex/classes.dex' "$aab_entries"
          grep -Fx 'base/lib/arm64-v8a/libMapper_arm64-v8a.so' "$aab_entries"
          grep -F "package: name='org.openorienteering.mapper'" "$badging"
          grep -Fx "sdkVersion:'28'" "$badging"
          grep -Fx "targetSdkVersion:'36'" "$badging"
          grep -Fx "native-code: 'arm64-v8a'" "$badging"

      - name: Upload Android packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Mapper-Android
          path: |
            build/ci-android/src/android-build/Mapper.apk
            build/ci-android/src/android-build/build/outputs/bundle/release/android-build-release.aab
          if-no-files-found: error
          compression-level: 0

      - name: Save vcpkg downloads
        if: >-
          success() &&
          steps.vcpkg_downloads.outputs.cache-hit != 'true' &&
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .vcpkg/downloads
          key: ${{ steps.vcpkg_downloads.outputs.cache-primary-key }}

      - name: Save vcpkg binary cache
        if: >-
          success() &&
          steps.vcpkg_binary.outputs.cache-hit != 'true' &&
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .vcpkg-cache
          key: ${{ steps.vcpkg_binary.outputs.cache-primary-key }}

      - name: Save Cargo sources
        if: >-
          success() &&
          steps.cargo_sources.outputs.cache-hit != 'true' &&
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ steps.cargo_sources.outputs.cache-primary-key }}

      - name: Save Rust target cache
        if: >-
          success() &&
          steps.rust_target.outputs.cache-hit != 'true' &&
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build/ci-android/cargo
          key: ${{ steps.rust_target.outputs.cache-primary-key }}

      - name: Save cargo-about
        if: >-
          success() &&
          steps.cargo_about.outputs.cache-hit != 'true' &&
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: build/ci-android/tools/cargo-about/bin
          key: ${{ steps.cargo_about.outputs.cache-primary-key }}

  release-draft:
    name: Draft release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [desktop, android]
    runs-on: ubuntu-24.04
    permissions:
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: Attest packages
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release-assets/**/*

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --draft --generate-notes --verify-tag
          find release-assets -type f -exec gh release upload "$GITHUB_REF_NAME" {} +
