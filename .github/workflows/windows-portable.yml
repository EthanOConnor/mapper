name: Windows Packaging

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Git ref to build
        required: true
        default: master
        type: string
      release_tag:
        description: Existing GitHub release tag to upload the installer to
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ inputs.source_ref }}
  cancel-in-progress: true

jobs:
  windows-x64-packaging:
    runs-on: windows-2022
    timeout-minutes: 90
    defaults:
      run:
        shell: msys2 {0}
    env:
      BUILD_DIR: build/windows-portable
      DIST_DIR: dist/OpenOrienteering-Mapper-windows-x64
    steps:
      - name: Configure checkout line endings
        shell: powershell
        run: git config --global core.autocrlf input

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 1

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: minimal
          update: true
          cache: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-gdal
            mingw-w64-x86_64-proj
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-imageformats
            mingw-w64-x86_64-qt5-location
            mingw-w64-x86_64-qt5-sensors
            mingw-w64-x86_64-qt5-serialport
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-translations
            mingw-w64-x86_64-nsis
            mingw-w64-x86_64-doxygen

      - name: Compute artifact metadata
        shell: powershell
        run: |
          $shortSha = (git rev-parse --short=7 HEAD).Trim()
          "SHORT_SHA=$shortSha" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ZIP_FILE=OpenOrienteering-Mapper-windows-x64-$shortSha.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure build
        run: |
          rm -rf "$BUILD_DIR" "$DIST_DIR"
          cmake -S . -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DMapper_AUTORUN_SYSTEM_TESTS=OFF \
            -DMapper_AUTORUN_MANUAL_TESTS=OFF \
            -DMapper_USE_GDAL=ON \
            -DMapper_PACKAGE_QT=ON \
            -DMapper_PACKAGE_PROJ=ON \
            -DMapper_PACKAGE_GDAL=ON \
            -DMapper_PACKAGE_ASSISTANT=OFF \
            -DMapper_MANUAL_QTHELP=OFF \
            -DMapper_MANUAL_PDF=OFF \
            -DGDAL_DATA_DIR=/mingw64/share/gdal \
            -DPROJ_DATA_DIR=/mingw64/share/proj

      - name: Build required targets
        run: |
          cmake --build "$BUILD_DIR" \
            --target Mapper Mapper_translations Mapper-manual mapper-gdal-info \
            --parallel 4

      - name: Stage portable install tree
        run: |
          dist_prefix="$(pwd)/$DIST_DIR"
          cmake --install "$BUILD_DIR" --prefix "$dist_prefix"
          "$BUILD_DIR/src/gdal/mapper-gdal-info.exe" > "$DIST_DIR/mapper-gdal-info.txt"

      - name: Validate staged install tree
        run: |
          test -f "$DIST_DIR/Mapper.exe"
          test -f "$DIST_DIR/qt.conf"
          test -f "$DIST_DIR/gdal/gdalvrt.xsd"
          test -f "$DIST_DIR/proj/proj.db"
          test -f "$DIST_DIR/mapper-gdal-info.txt"
          compgen -G "$DIST_DIR/Qt5*.dll" > /dev/null

      - name: Create portable ZIP
        shell: powershell
        run: |
          $sourceDir = Join-Path $env:GITHUB_WORKSPACE $env:DIST_DIR
          $zipPath = Join-Path $env:GITHUB_WORKSPACE "dist\$env:ZIP_FILE"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -LiteralPath $sourceDir -DestinationPath $zipPath -CompressionLevel Optimal

      - name: Validate ZIP contents
        shell: powershell
        run: |
          $zipPath = Join-Path $env:GITHUB_WORKSPACE "dist\$env:ZIP_FILE"
          if (-not (Test-Path $zipPath)) {
            throw "ZIP artifact was not created: $zipPath"
          }

          $extractDir = Join-Path $env:RUNNER_TEMP "windows-portable-zip-check"
          if (Test-Path $extractDir) {
            Remove-Item $extractDir -Recurse -Force
          }

          Expand-Archive -LiteralPath $zipPath -DestinationPath $extractDir

          $rootDir = Join-Path $extractDir "OpenOrienteering-Mapper-windows-x64"
          if (-not (Test-Path (Join-Path $rootDir "Mapper.exe"))) {
            throw "ZIP is missing Mapper.exe"
          }
          if (-not (Test-Path (Join-Path $rootDir "qt.conf"))) {
            throw "ZIP is missing qt.conf"
          }
          if (-not (Test-Path (Join-Path $rootDir "gdal\gdalvrt.xsd"))) {
            throw "ZIP is missing GDAL data"
          }
          if (-not (Test-Path (Join-Path $rootDir "proj\proj.db"))) {
            throw "ZIP is missing PROJ data"
          }
          if (-not (Test-Path (Join-Path $rootDir "mapper-gdal-info.txt"))) {
            throw "ZIP is missing mapper-gdal-info.txt"
          }
          if (-not (Get-ChildItem -Path $rootDir -Filter "Qt5*.dll" -File | Select-Object -First 1)) {
            throw "ZIP is missing Qt runtime DLLs"
          }

      - name: Build Windows installer
        run: |
          cmake --build "$BUILD_DIR" --target package --parallel 4

      - name: Locate installer artifact
        shell: powershell
        run: |
          $package = Get-ChildItem `
            -Path (Join-Path $env:GITHUB_WORKSPACE $env:BUILD_DIR) `
            -Filter "OpenOrienteering-Mapper-*.exe" `
            -File |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          if (-not $package) {
            throw "Installer package was not created"
          }

          "INSTALLER_FILE=$($package.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INSTALLER_PATH=$($package.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-portable
          path: dist/OpenOrienteering-Mapper-windows-x64-*.zip
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-installer
          path: build/windows-portable/OpenOrienteering-Mapper-*.exe
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Upload installer to GitHub release
        if: ${{ inputs.release_tag != '' }}
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" "$env:INSTALLER_PATH" `
            --repo "${{ github.repository }}" `
            --clobber
