name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ninja-build \
            qt6-base-dev qt6-base-private-dev qt6-tools-dev qt6-tools-dev-tools \
            qt6-l10n-tools qt6-sensors-dev qt6-serialport-dev \
            qt6-positioning-dev qt6-image-formats-plugins qt6-5compat-dev \
            libproj-dev libgdal-dev zlib1g-dev \
            libcups2-dev doxygen graphviz libegl-dev libgl-dev

      - name: Configure
        run: cmake --preset release-linux

      - name: Build
        run: cmake --build --preset release-linux --parallel

      - name: Test
        run: ctest --preset release-linux

      - name: Package
        run: cd build/release-linux && cpack -G DEB

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-packages
          path: build/release-linux/*.deb
          if-no-files-found: warn
          retention-days: 30

  windows:
    runs-on: windows-2025
    timeout-minutes: 90
    defaults:
      run:
        shell: msys2 {0}
    env:
      DIST_DIR: dist/OpenOrienteering-Mapper-windows-x64
    steps:
      - name: Configure checkout line endings
        shell: powershell
        run: git config --global core.autocrlf input

      - uses: actions/checkout@v6

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: minimal
          update: true
          cache: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-gdal
            mingw-w64-x86_64-proj
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-imageformats
            mingw-w64-x86_64-qt6-positioning
            mingw-w64-x86_64-qt6-sensors
            mingw-w64-x86_64-qt6-serialport
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-qt6-translations
            mingw-w64-x86_64-qt6-5compat
            mingw-w64-x86_64-doxygen

      - name: Configure
        run: cmake --preset release-windows

      - name: Build
        run: cmake --build --preset release-windows --parallel

      - name: Test
        run: ctest --preset release-windows

      - name: Stage install tree
        run: cmake --install build/release-windows --prefix "$(pwd)/$DIST_DIR"

      - name: Create ZIP
        shell: powershell
        run: |
          Compress-Archive -LiteralPath $env:DIST_DIR `
            -DestinationPath dist/OpenOrienteering-Mapper-windows-x64.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-packages
          path: dist/OpenOrienteering-Mapper-windows-x64.zip
          if-no-files-found: warn
          retention-days: 30

  macos:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          brew install qt proj gdal ninja doxygen
          echo "$(brew --prefix qt)/bin" >> "$GITHUB_PATH"

      - name: Configure
        run: >
          cmake --preset release-macos
          -DCMAKE_PREFIX_PATH="$(brew --prefix qt)"

      - name: Build
        run: cmake --build --preset release-macos --parallel

      - name: Test
        run: ctest --preset release-macos

      - name: Package
        run: cd build/release-macos && cpack -G DragNDrop

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-packages
          path: build/release-macos/*.dmg
          if-no-files-found: warn
          retention-days: 30
