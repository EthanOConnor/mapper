version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: vcpkg
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2

  - package-ecosystem: cargo
    directory: /src/render/vello
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      rust-renderer:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
